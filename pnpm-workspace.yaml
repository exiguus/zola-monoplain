packages:
  - "packages/*"
  - "themes/*"
  - "themes/**/content/**/examples/*"

minimumReleaseAge: 10080

blockExoticSubdeps: true

trustPolicy: "no-downgrade"
trustPolicyExclude:
  - "semver@5.7.2 || 6.3.1"

strictDepBuilds: true

allowBuilds:
  dprint: true
  puppeteer: true

peerDependencyRules:
  allowedVersions:
    react: ">=18.0.0 <19.0.0"
    react-dom: ">=18.0.0 <19.0.0"
    react-refresh: ">=0.8.3 <1.0.0"
    typescript: ">=5 <6"

overrides:
  "minimatch@<10.2.1": ">=10.2.1"
